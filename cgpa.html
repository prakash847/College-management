<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CALC FOR ENGINEER (CSE)</title>

  <link rel="stylesheet" href="c-style.css" />
</head>

<body>

  <h1>CALC FOR ENGINEER (CSE)</h1>

  <div class="container">

    <h1>CGPA Calculator for CSE</h1>

    <div>
      <label for="numSemesters">
        Select Number of Semesters:
      </label>

      <select id="numSemesters" onchange="updateSemesterOptions()">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>

    <div>
      <label for="semester">
        Select Semesters:
      </label>

      <select
        id="semester"
        multiple
        onchange="loadSubjects()">
      </select>
    </div>

    <div id="subjectTable"></div>

    <button onclick="calculateCGPA()">
      Calculate CGPA
    </button>

    <div id="result"></div>
    <div id="combinedResult"></div>
    <div id="resultLink"></div>
    <div id="arrearPapers"></div>
    <div id="studyTips"></div>

    <button onclick="downloadPDF()">
      Download PDF
    </button>

    <div id="feedback">
      <h2>Feedback</h2>

      <textarea
        id="feedbackText"
        placeholder="Enter your feedback here...">
      </textarea>

      <button onclick="submitFeedback()">
        Submit Feedback
      </button>
    </div>

    <a id="backLink" style="text-decoration: none;">
      <button style="background: #6c757d; color: white;">
        Back to Dashboard
      </button>
    </a>

  </div>

  <div id="gradeModal">
    <div class="modal-content">
      <h2>Missing Grades</h2>

      <p>
        Please select a grade for all subjects before calculating CGPA.
      </p>

      <button onclick="closeModal()">
        Close
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="c-js.js"></script>

</body>

</html>
