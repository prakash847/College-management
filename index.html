/* 🌼 Fullscreen background */
body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Poppins', Arial, Helvetica, sans-serif; background: #ffffff; color: #000000; }
#particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
/* Center container */
.centered { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
/* 🩵 Wrapper for the two login cards */
.login-wrapper { display: flex; gap: 40px; justify-content: center; align-items: center; width: 100%; padding: 20px; box-sizing: border-box; }
/* 🩵 Card container */
.card { background: #004b8d; padding: 30px 25px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); width: 380px; text-align: center; color: #ffffff; opacity: 0; transform: translateY(-50px) scale(0.8); animation: cardEntrance 1s forwards cubic-bezier(0.68, -0.55, 0.27, 1.55); }
.card:nth-child(2) { animation-delay: 0.2s; }
/* Card entrance animation */
@keyframes cardEntrance { to { opacity: 1; transform: translateY(0) scale(1); } }
/* 🖋 Headings */
h2 { margin: 0 0 10px 0; text-align: center; color: #ffffff; }
/* 🧊 Labels */
label { display: block; margin-top: 10px; font-size: 13px; color: #f4bd58; text-align: left; font-weight: 600; }
/* 🖤 Input boxes */
input { width: 100%; padding: 8px; border-radius: 8px; border: 2px solid #f4bd58; background: #ffffff; color: #000000; margin-top: 6px; box-sizing: border-box; font-size: 14px; }
/* 🖤 Buttons */
button { margin-top: 16px; width: 100%; padding: 10px; border-radius: 8px; background: #f4bd58; color: #000000; border: none; font-weight: 600; cursor: pointer; }
/* Dashboard Buttons */
.dash-buttons { display: flex; flex-direction: column; gap: 15px; width: 450px; margin: auto; font-weight: bold;}
.logout { background: #c0392b; color: #ffffff; font-weight: bold;}
.hidden { display: none; }
#welcome { 
  color: #004b8d;
  margin-top: 90px;}
</style>
</head>

<body style="background-image: url(Picsart_25-10-15_09-28-31-795.jpg); background-size: cover; background-repeat: no-repeat; width: 100%;">

<div id="loginContainer" class="centered">
  <div class="login-wrapper">
    <div class="card">
      <h2>Login — Student</h2>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <label for="roll">Enter your Roll Number</label>
        <input id="roll" type="text" inputmode="numeric" placeholder="Enter your roll no" required>
        <label for="pwd">Enter Password</label>
        <input id="pwd" type="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
      </form>
    </div>
    <div class="card">
      <h2>Login — Staff</h2>
      <form id="staffForm" onsubmit="return handleStaffLogin(event)">
        <label for="staffUser">Enter Username</label>
        <input id="staffUser" type="text" placeholder="Enter your name" required>
        <label for="staffPwd">Enter Password</label>
        <input id="staffPwd" type="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>
</div>

<div id="dashboard" class="centered hidden">
  <h2 id="welcome">Welcome</h2>
  <div class="dash-buttons">
    <a id="studentIdCardLink"><button>ID CARD</button></a>
    <a id="studentLeaveLink"><button>LEAVE LETTER</button></a>
    <a id="studentOdLink"><button>OD FORM</button></a>
    <a id="studentCgpaLink"><button>CGPA</button></a>
    <button class="logout" onclick="logout()">LOGOUT</button>
  </div>
</div>

<div id="staffDashboard" class="centered hidden">

  <div class="dash-buttons">

// --- STUDENT LOGIN LOGIC ---
function handleLogin(e){
  e.preventDefault();
  const roll = document.getElementById('roll').value.trim();
  const pwd = document.getElementById('pwd').value.trim();
  if(!students[roll]){
    alert("This Roll Number is not registered.");
    return;
  }
  if(pwd === roll.slice(-4)){
    showDashboard(roll);
  } else {
    alert("Wrong password. Hint: Last 4 digits of your roll number.");
  }
}

// --- SHOW STUDENT DASHBOARD & UPDATE LINKS ---
function showDashboard(roll){
  document.getElementById('loginContainer').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('welcome').textContent = "Welcome, " + students[roll];

  // Dynamically set href for all student links to pass the roll number
  document.getElementById('studentLeaveLink').href = `leaveletter.html?roll=${roll}`;
  document.getElementById('studentOdLink').href = `od.html?roll=${roll}`;
  document.getElementById('studentCgpaLink').href = `cgpa.html?userType=student&roll=${roll}`;
  document.getElementById('studentIdCardLink').href = `id.html?roll=${roll}`;
}

// --- STAFF LOGIN LOGIC ---
function handleStaffLogin(e){
  e.preventDefault();
  const user = document.getElementById('staffUser').value.trim();
  const pwd = document.getElementById('staffPwd').value.trim();
  if(pwd === "FMCET"){
    showStaffDashboard(user);
  } else {
    alert("Incorrect password for staff.");
  }
}

// --- SHOW STAFF DASHBOARD ---
function showStaffDashboard(name){
  document.getElementById('loginContainer').classList.add('hidden');
  document.getElementById('staffDashboard').classList.remove('hidden');
  document.getElementById('staffWelcome').textContent = "Welcome, " + name;
}

// --- LOGOUT FUNCTION ---
function logout(){
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('staffDashboard').classList.add('hidden');
  document.getElementById('loginContainer').classList.remove('hidden');

  // Clear all input fields on logout
  document.getElementById('roll').value = '';
  document.getElementById('pwd').value = '';
  document.getElementById('staffUser').value = '';
  document.getElementById('staffPwd').value = '';
}

// --- HANDLE DIRECT NAVIGATION VIA URL ---
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const rollFromUrl = urlParams.get('roll');
    const userFromUrl = urlParams.get('user');

    if (rollFromUrl && students[rollFromUrl]) {
        // If a valid student roll number is in the URL, show student dashboard
        showDashboard(rollFromUrl);
    } else if (userFromUrl === 'staff') {
        // If 'user=staff' is in the URL, show staff dashboard
        showStaffDashboard('Staff Member');
    }
};
