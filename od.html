<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College OD Form Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* General Page Setup */
  body { font-family: 'Poppins', Arial, sans-serif; background: #ffffff; margin: 0; padding: 20px; color: #000000; }
  h2 { text-align: center; color: #004b8d; }
  .main { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
  .container, .preview { width: 45%; min-width: 400px; background: #004b8d; padding: 25px; border-radius: 16px; box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15); }
  label { font-weight: 600; display: block; margin-top: 12px; color: #f4bd58; }
  input, textarea { width: 100%; padding: 8px; margin-top: 6px; box-sizing: border-box; border-radius: 8px; border: none; background: #f4bd58; color: #000000; font-size: 15px; outline: none; }
  button { margin-top: 10px; margin-right: 10px; background: #f4bd58; color: #000000; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .preview { white-space: pre-line; color: #ffffff; }
  /* ==========================
   MOBILE RESPONSIVE
========================== */
@media screen and (max-width:768px){

body{
    padding:15px;
}

.main{
    flex-direction:column;
    gap:20px;
}

.container,
.preview{
    width:100%;
    min-width:unset;
    padding:18px;
    box-sizing:border-box;
}

input,
textarea{
    font-size:16px;
}

button{
    width:100%;
    margin:8px 0;
}

.preview{
    white-space:pre-wrap;
    word-break:break-word;
}

h2{
    font-size:26px;
}
}
  .back-btn{
    display:block;
    width:100%;
    text-align:center;
    background:#6c757d;
    color:#fff;
    text-decoration:none;
    padding:12px;
    border-radius:8px;
    font-weight:600;
    box-sizing:border-box;
    margin-top:8px;
}
</style>
</head>
<body>

<h2>College On Duty (OD) Form Generator</h2>

<div class="main">
  <div class="container">
    <label>Your Name:</label>
    <input type="text" id="name" class="od-input" oninput="generateODForm()">
    <label>Register Number:</label>
    <input type="number" id="regno" class="od-input" oninput="generateODForm()">
    <label>Year and Department:</label>
    <input type="text" id="dept" class="od-input" oninput="generateODForm()">
    <label>Event / Work Name:</label>
    <input type="text" id="event" class="od-input" oninput="generateODForm()">
    <label>Venue / Location:</label>
    <input type="text" id="venue" class="od-input" oninput="generateODForm()">
    <label>Purpose / Reason:</label>
    <textarea id="reason" class="od-input" rows="2" oninput="generateODForm()"></textarea>
    <label>Date (Start):</label>
    <input type="date" id="startDate" class="od-input" onchange="generateODForm()">
    <label>Date (End) <small>(optional)</small>:</label>
    <input type="date" id="endDate" class="od-input" onchange="generateODForm()">
    <label>Submitted To:</label>
    <input type="text" id="submitTo" class="od-input" oninput="generateODForm()">

    <div>
        <button onclick="downloadPDF()">Download PDF</button>
        <button style="background:#25D366" onclick="shareWhatsApp()">Share via WhatsApp</button>
        <a id="backLink" class="back-btn">Back to Dashboard</a>
        </div>
  </div>

  <div class="preview" id="output">
    <p style="text-align:center; color:#ddd;">Preview will appear here...</p>
  </div>
</div>

<script>
const college = "FATIMA MICHAEL COLLEGE OF ENGINEERING & TECHNOLOGY";
const city = "Senkottai Village, Madurai - Sivagangai Main Road,\nMadurai - 625 020";
const watermarkImg = "https://i.ibb.co/Y3f6x9h/sample-watermark.png";

function formatDate(dateStr) {
  if (!dateStr) return "";
  const [year, month, day] = dateStr.split("-");
  return `${day}/${month}/${year}`;
}

function generateODForm() {
  const name = document.getElementById("name").value;
  const regno = document.getElementById("regno").value;
  const dept = document.getElementById("dept").value;
  const event = document.getElementById("event").value;
  const venue = document.getElementById("venue").value;
  const reason = document.getElementById("reason").value;
  const startDate = formatDate(document.getElementById("startDate").value);
  const endDate = formatDate(document.getElementById("endDate").value);
  const submitTo = document.getElementById("submitTo").value;

  if (!name && !regno && !event && !startDate) {
    document.getElementById("output").innerHTML = `<p style="text-align:center; color:#ddd;">Preview will appear here...</p>`;
    return;
  }

  const dateLine = (!endDate || endDate === startDate) 
    ? `Date: ${startDate || '(start date)'}` 
    : `Date: ${startDate || '(start date)'} to ${endDate || '(end date)'}`;

  const letter = `
${college}
${city}

-------------------------------
          ON DUTY FORM
-------------------------------

Name: ${name}
Register No: ${regno}
Year & Department: ${dept}
Event / Work: ${event}
Venue: ${venue}
Purpose: ${reason}
${dateLine}

Submitted To: ${submitTo}


-------------------------------
Signature of Student: __________________
Signature of Class In-Charge: __________
Signature of HOD: _____________________
Signature of Principal: ________________
`;
  document.getElementById("output").innerText = letter;
}

async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: "portrait" });
    const text = document.getElementById("output").innerText;

    if (text.includes("Preview will appear here...")) {
        alert("Please fill the form to generate the letter first!");
        return;
    }

    // --- Watermark logic (idha appadiye vittudunga) ---
    const imgWidth = 80, imgHeight = 80;
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const x = (pageWidth - imgWidth) / 2;
    const y = (pageHeight - imgHeight) / 2;

    try {
        const img = await loadImage(watermarkImg);
        pdf.addImage(img, "PNG", x, y, imgWidth, imgHeight, undefined, "FAST");
    } catch (e) {
        console.warn("Watermark not loaded:", e);
    }

    // ==========================================================
    // --- PUDHUSA ADD PANNA CODE INGA IRUKU ---
    // ==========================================================
    const title = "OD LETTER";
    pdf.setFont("times", "bold");      // Font-a BOLD aakurom
    pdf.setFontSize(16);               // Title-ku periya font size
    pdf.setTextColor(0, 0, 0);         // Color-a BLACK aakurom
    pdf.text(title, pageWidth / 2, 20, { align: "center" }); // Page-ku center-la title-a vekkirom

    // --- Letter content-ku marubadiyum normal font-a set panrom ---
    pdf.setFont("times", "normal");
    pdf.setFontSize(12);
    const margin = 20;
    const lines = pdf.splitTextToSize(text, 170);
    // Title-ku keezha varathukku, position-a 30-la irundhu 40-ku maathrom
    pdf.text(lines, margin, 40); 
    // ==========================================================

    pdf.save("OD_Form.pdf");
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = (err) => reject(err);
    img.src = url;
  });
}

function shareWhatsApp() {
  const text = document.getElementById("output").innerText.trim();
   if (text.includes("Preview will appear here...")) {
    alert("Please fill the form first!");
    return;
  }
  const encodedText = encodeURIComponent(text);
  const url = `https://wa.me/?text=${encodedText}`;
  window.open(url, "_blank");
}

// ==========================================================
// --- INTHA SCRIPT PUDHUSA ADD PANNIRUKEN ---
window.addEventListener('load', function() {
    generateODForm(); // To show the placeholder text on load
    
    const urlParams = new URLSearchParams(window.location.search);
    const roll = urlParams.get('roll');
    const backButtonLink = document.getElementById('backLink');
    
    if (roll) {
        backButtonLink.href = `index.html?roll=${roll}`;
    } else {
        // Fallback in case roll number isn't passed correctly
        backButtonLink.href = 'index.html'; 
    }
});
// ==========================================================

</script>
</body>
</html>
